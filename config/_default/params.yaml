# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# ══════════════════════════════════════════════════════════════════════════════

hugoblox:
  schema: "2.0"

  pro:
    hide_attribution: true

  identity:
    name: "Ueda Group"
    organization: "Center for Quantum Information and Quantum Biology (QIQB), The University of Osaka"
    type: organization

    tagline: "Tensor Networks, Quantum Algorithms, and Quantum-Classical Hybrid Computation"

    description: >-
      Official website of the Ueda Group at the Center for Quantum Information
      and Quantum Biology (QIQB), The University of Osaka.
      The group studies tensor networks, quantum many-body physics,
      quantum algorithms, entanglement structures,
      and quantum-classical hybrid computation.

    social:
      twitter: ""
      github: "ueda-group"

  theme:
    mode: system
    pack: "default"

  typography:
    pack: "academic"

  layout:
    radius: "md"
    spacing: "spacious"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false

  footer:
    style: minimal

  copyright:
    notice: "© {year} Ueda Group, Center for Quantum Information and Quantum Biology (QIQB), The University of Osaka"

    license:
      enable: false

  seo:
    title: ""

  content:
    math:
      enable: false

    toc:
      enable: true

    reading_time:
      enable: true

  search:
    enable: true

  comments:
    enable: false

  analytics:
    google:
      measurement_id: ""

  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

# Custom CSS
custom_css:
  - custom.css

sharing:
  image: media/og-image.png
  twitter_image: media/og-image.png

marketing:
  seo:
    site_type: ResearchGroup
    local_business_type: ''
    org_name: 'Ueda Group'
    description: 'Official website of the Ueda Group'
    twitter: 'GetResearchDev'
    image: 'media/og-image.png'