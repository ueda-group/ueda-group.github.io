# ══════════════════════════════════════════════════════════════════════════════
# HUGO BLOX CONFIGURATION
# Schema: hugoblox.com/schema/v2
# ══════════════════════════════════════════════════════════════════════════════

hugoblox:
  schema: "2.0"

  identity:
    name: "Ueda Group"
    organization: "Center for Quantum Information and Quantum Biology (QIQB), The University of Osaka"
    type: organization
    tagline: "Tensor Networks, Quantum Algorithms, and Quantum-Classical Hybrid Computation"
    description: >-
      Official website of the Ueda Group at the Center for Quantum Information
      and Quantum Biology (QIQB), The University of Osaka. The group studies
      tensor networks, quantum many-body physics, quantum algorithms,
      entanglement structures, and quantum-classical hybrid computation.
    social:
      twitter: ""
      github: "ueda-group"

  theme:
    mode: system
    pack: "default"
    colors:
      primary: ""
      secondary: ""
      neutral: ""
    colors_light: {}
    colors_dark: {}
    surfaces:
      background: ""
      foreground: ""
      header:
        background: ""
        foreground: ""
      footer:
        background: ""
        foreground: ""

  typography:
    pack: "academic"

  layout:
    radius: "md"
    spacing: "spacious"
    avatar_shape: circle

  header:
    enable: true
    style: navbar
    sticky: true
    align: center
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    cta:
      enable: false
      text: ""
      url: ""

  footer:
    style: minimal
    language_switcher: false
    text: ""

  copyright:
    notice: "© {year} Ueda Group. All rights reserved."
    license:
      type: custom
      allow_derivatives: false
      share_alike: false
      allow_commercial: false

  seo:
    title: ""
    location:
      address:
        street: ""
        city: ""
        region: ""
        postal_code: ""
        country: ""
      coordinates:
        latitude: null
        longitude: null
      phone: ""
    ai:
      allow:
        - /
      disallow: []
      note: "Public research group website of the Ueda Group."
      contact: "ueda.hiroshi.qiqb@osaka-u.ac.jp"

  content:
    math:
      enable: false
    toc:
      enable: true
    reading_time:
      enable: true
    citations:
      style: apa

  search:
    enable: true
    suggestions: []
    quick_actions: []

  comments:
    enable: false
    provider: ""
    giscus:
      repo: ""
      repo_id: ""
      category: ""
      category_id: ""
    disqus:
      shortname: ""

  analytics:
    google:
      measurement_id: ""
    google_tag_manager:
      container_id: ""
    plausible:
      domain: ""
    fathom:
      site_id: ""
    pirsch:
      site_id: ""
    clarity:
      project_id: ""
    baidu:
      site_id: ""

  verification:
    google: ""
    bing: ""
    baidu: ""
    yandex: ""
    pinterest: ""
    naver: ""

  repository:
    enable: false
    url: "https://github.com/ueda-group/ueda-group.github.io"
    branch: main
    content_dir: content

  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: en-us

  security:
    csp:
      policy: ""
      report_only: false
    frame_options: allow
    permissions_policy: ""

  privacy:
    enable: false
    anonymize_analytics: true

  debug:
    enable: false
    hud:
      position: bottom-left
      opacity: 1.0
    export_logs: true

  pro:
    hide_attribution: false
    affiliate_code: ""

# Custom CSS
custom_css:
  - custom.css