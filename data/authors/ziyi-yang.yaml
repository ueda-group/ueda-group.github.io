bio: |
  Ziyi Yang is an undergraduate student in Mathematics and Physics
  at the University of Toronto.

  His research interests include quantum computing,
  quantum mechanics, computational physics,
  quantum optics, and machine learning applications in physics.

  He has experience in optical and photonics experiments,
  computational modeling, and data-driven scientific analysis.

  At the Ueda Group, he is engaged in research on
  tensor networks, quantum many-body systems,
  and hybrid quantum-classical computation.

