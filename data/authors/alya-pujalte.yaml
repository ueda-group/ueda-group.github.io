bio: |
  Alya Pujalte is a Master's student in theoretical physics at EPFL
  (École Polytechnique Fédérale de Lausanne).

  Her research interests include tensor network methods,
  condensed matter physics, quantum many-body systems,
  and machine learning approaches to topological quantum physics.

  She has worked on DMRG analyses of low-energy excitations
  in anisotropic spin chains and on machine-learning studies
  of the Toric Code.

  At the Ueda Group, she is engaged in research on tensor networks,
  quantum many-body physics, and quantum-classical hybrid computation.

