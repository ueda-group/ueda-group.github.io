bio: |
  Katsuhiro Morita is a theoretical condensed matter physicist
  specializing in quantum magnetism and strongly correlated systems.

  His research focuses on quantum spin systems,
  frustrated magnetism,
  kagome lattice systems,
  quantum phase transitions,
  and finite-temperature properties of strongly correlated materials.

  He has extensive experience in numerical many-body methods,
  including DMRG,
  exact diagonalization,
  finite-temperature Lanczos methods,
  cluster mean-field approaches,
  and Monte Carlo simulations.

  After his affiliation with the Ueda Group,
  he joined Tohoku University as a tenure-track Assistant Professor.

  He was affiliated with the Ueda Group as a
  Specially Appointed Associate Professor
  from April to June 2025.

