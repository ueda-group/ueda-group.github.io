bio: |
  Rito Furuchi is a researcher in condensed matter physics,
  frustrated quantum magnetism,
  and quantum simulation using Rydberg atom systems.

  His research focuses on numerical studies of
  low-dimensional quantum spin systems,
  frustrated Heisenberg antiferromagnets,
  ferrimagnetism,
  spin nematic phases,
  and magnetization plateaus.

  After his affiliation with the Ueda Group,
  he joined Kindai University as a researcher.

  He was affiliated with the Ueda Group as a
  Specially Appointed Researcher (part-time)
  from February to March 2025.

