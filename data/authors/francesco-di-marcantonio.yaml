bio: |
  Francesco Di Marcantonio is a PhD student in Physics
  at the University of the Basque Country (UPV/EHU)
  and collaborates with CERN Quantum Technology Initiative (QTI).

  His research focuses on tensor network methods,
  lattice gauge theories, quantum simulation,
  and quantum machine learning.

  He has worked on real-time dynamics of gauge theories,
  confinement phenomena, roughening transitions,
  and quantum-kernel-based machine learning frameworks.

  Francesco visited the Ueda Group as a PhD internship student from April to June 2026, working on collaborative research on tensor-network approaches to lattice gauge theories, quantum many-body systems, and Tree Tensor Network methods.

